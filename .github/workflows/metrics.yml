name: Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 6 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate whenever main changes
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # Uses a personal token (METRICS_TOKEN) if you add one as a repo secret
          # (unlocks private-contribution stats); otherwise falls back to the
          # built-in GITHUB_TOKEN, which covers all public stats with zero setup.
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: Gustav-Proxi
          filename: metrics.svg
          template: classic
          base: header, repositories
          config_timezone: America/New_York
          # Language breakdown (replaces the old "Top languages" card)
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, scss, tex
          # Full-year contribution calendar (clean, animated-looking visual)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
